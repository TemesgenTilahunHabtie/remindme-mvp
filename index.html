<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemindMe</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-black text-white p-4">
  <h1 class="font-bold">RemindMe: TikTok Intent Saver</h1>
</header>

<main class="max-w-xl mx-auto p-4"></main>

<script>
let sb;
let currentUser = null;

const SUPABASE_URL = "https://iqgqnjfsjpjsrxcjornm.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_KEY";

function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data }) => {
    currentUser = data.session?.user || null;
    render();
  });

  sb.auth.onAuthStateChange((_event, session) => {
    currentUser = session?.user || null;
    render();
  });
}

function render() {
  const main = document.querySelector("main");

  if (!currentUser) {
    main.innerHTML = `
      <!-- LOGIN SECTION -->
      <div class="bg-white p-4 rounded shadow space-y-3">

        <input id="email" class="w-full border p-2 rounded" placeholder="Email"/>
        <input id="password" type="password" class="w-full border p-2 rounded" placeholder="Password"/>

        <button onclick="signUp()" class="w-full bg-gray-700 text-white p-2 rounded">
          Sign Up
        </button>

        <button onclick="signIn()" class="w-full bg-black text-white p-2 rounded">
          Sign In
        </button>

      </div>
    `;
    return;
  }

  main.innerHTML = `
    <!-- MAIN APP -->
    <div class="space-y-3">

      <div class="flex justify-between text-sm">
        <span>${currentUser.email}</span>
        <button onclick="logout()" class="text-red-500">Logout</button>
      </div>

      <input id="url" class="w-full border p-2 rounded" placeholder="TikTok URL"/>

      <textarea id="intent" class="w-full border p-2 rounded" placeholder="Why are you saving this?"></textarea>

      <select id="tag" class="w-full border p-2 rounded">
        <option>Cooking</option>
        <option>Learning</option>
        <option>Shopping</option>
        <option>Entertainment</option>
      </select>

      <button onclick="saveItem()" class="w-full bg-black text-white p-2 rounded">
        Save
      </button>

      <!-- AI ACTION BUTTON (PATCH AREA) -->
      <!-- AI_BUTTON_START -->
<!-- AI_BUTTON_START -->

<button
  onclick="analyze()"
  class="w-full bg-blue-600 text-white p-2 rounded">
  Analyze with AI
</button>

<!-- AI_BUTTON_END -->
      <!-- AI_BUTTON_END -->

      <h2 class="font-bold mt-6">My Saved Content</h2>
      <div id="list" class="space-y-3"></div>

    </div>
  `;
}

async function signUp() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { data, error } = await sb.auth.signUp({
    email,
    password
  });

  if (error) {
    alert(error.message);
    return;
  }

  // IMPORTANT: try auto-login immediately
  const { data: loginData, error: loginError } =
    await sb.auth.signInWithPassword({
      email,
      password
    });

  if (loginError) {
    alert("Signup success but login failed: " + loginError.message);
    return;
  }

  alert("Account created and logged in!");
  currentUser = loginData.user;
  render();
}

async function signIn() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const { error } = await sb.auth.signInWithPassword({
    email,
    password
  });

  if (error) alert(error.message);
}

async function logout() {
  await sb.auth.signOut();
}

async function saveItem() {
  const url = document.getElementById("url").value;
  const intent = document.getElementById("intent").value;
  const tag = document.getElementById("tag").value;

  await sb.from("saved_content").insert([{
    url,
    intent,
    tag,
    user_id: currentUser.id
  }]);

  loadItems();
}

async function loadItems() {
  const { data } = await sb
    .from("saved_content")
    .select("*")
    .eq("user_id", currentUser.id)
    .order("id", { ascending: false });

  const list = document.getElementById("list");
  list.innerHTML = "";

  (data || []).forEach(item => {
    const div = document.createElement("div");
    div.className = "bg-white p-3 rounded shadow";

    div.innerHTML = `
      <div class="text-xs text-gray-500">${item.tag}</div>
      <a href="${item.url}" target="_blank" class="text-blue-600 underline">
        Open TikTok
      </a>
      <p class="text-gray-700 mt-2">${item.intent}</p>
    `;

    list.appendChild(div);
  });
}
async function analyze() {

  const url =
    document.getElementById("url").value;

  const intent =
    document.getElementById("intent").value;

  const response = await fetch(
    "/.netlify/functions/analyze",
    {
      method: "POST",

      headers: {
        "Content-Type": "application/json"
      },

      body: JSON.stringify({
        url,
        intent
      })
    }
  );

  const data = await response.json();

  alert(
`AI Summary:
${data.ai_summary}

Category:
${data.ai_category}

Intent Cluster:
${data.intent_cluster}

Suggested Action:
${data.suggested_action}

Priority:
${data.priority_score}`
  );
}

window.analyze = analyze;
window.signUp = signUp;
window.signIn = signIn;
window.logout = logout;
window.saveItem = saveItem;

window.addEventListener("load", init);
</script>

</body>
</html>
