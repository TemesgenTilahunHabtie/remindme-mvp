<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>RemindMe</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#000000">
</head>

<body class="bg-gray-100 min-h-screen">

<header class="bg-black text-white p-4">
  <h1 class="font-bold">RemindMe: TikTok Intent Saver</h1>
</header>

<main class="max-w-xl mx-auto p-4"></main>

<script>

let sb;
let currentUser = {
  id: "local-user",
  email: "demo@remindme.app"
};

const SUPABASE_URL = "https://iqgqnjfsjpjsrxcjornm.supabase.co";
const SUPABASE_KEY = "YOUR_SUPABASE_KEY";

function init() {
  sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  render();
}

function render() {
  const main = document.querySelector("main");

  main.innerHTML = `
    <div class="space-y-3">

      <div class="text-sm text-gray-600">
        Logged in as: ${currentUser.email}
      </div>

      <input id="url" class="w-full border p-2 rounded" placeholder="TikTok URL"/>

      <textarea id="intent" class="w-full border p-2 rounded" placeholder="Why are you saving this?"></textarea>

      <select id="tag" class="w-full border p-2 rounded">
        <option>Cooking</option>
        <option>Learning</option>
        <option>Shopping</option>
        <option>Entertainment</option>
      </select>

      <button onclick="saveItem()" class="w-full bg-black text-white p-2 rounded">
        Save
      </button>

      <button onclick="analyze()" class="w-full bg-blue-600 text-white p-2 rounded">
        Analyze with AI
      </button>

      <h2 class="font-bold mt-6">My Saved Content</h2>
      <div id="list" class="space-y-3"></div>

    </div>
  `;

  loadItems();
}

function saveItem() {
  const url = document.getElementById("url").value;
  const intent = document.getElementById("intent").value;
  const tag = document.getElementById("tag").value;

  const items = JSON.parse(localStorage.getItem("items") || "[]");

  items.push({ url, intent, tag });

  localStorage.setItem("items", JSON.stringify(items));

  loadItems();
}

function loadItems() {
  const list = document.getElementById("list");
  const items = JSON.parse(localStorage.getItem("items") || "[]");

  list.innerHTML = "";

  items.slice().reverse().forEach(item => {
    const div = document.createElement("div");
    div.className = "bg-white p-3 rounded shadow";

    div.innerHTML = `
      <div class="text-xs text-gray-500">${item.tag}</div>
      <a href="${item.url}" target="_blank" class="text-blue-600 underline">
        Open TikTok
      </a>
      <p class="text-gray-700 mt-2">${item.intent}</p>
    `;

    list.appendChild(div);
  });
}

async function analyze() {
  const url = document.getElementById("url").value;
  const intent = document.getElementById("intent").value;

  const response = await fetch("/.netlify/functions/analyze", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ url, intent })
  });

  const data = await response.json();

  alert(
    "AI Summary:\n\n" +
    data.ai_summary +
    "\n\nCategory: " +
    data.ai_category +
    "\n\nCluster: " +
    data.intent_cluster +
    "\n\nAction: " +
    data.suggested_action +
    "\n\nPriority: " +
    data.priority_score
  );
}

window.analyze = analyze;
window.saveItem = saveItem;

window.addEventListener("load", init);

</script>

</body>
</html>
